name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apple-silicon:
    name: Build Apple Silicon app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show runner architecture
        run: |
          uname -a
          test "$(uname -m)" = "arm64"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "arm64"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate syntax
        run: python -m py_compile app.py

      - name: Build macOS app
        run: pyinstaller --clean --noconfirm PDFTranMd.spec

      - name: Inspect bundle size
        run: du -sh dist/PDFTranMd.app dist/PDFTranMd

      - name: Package artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/PDFTranMd.app PDFTranMd-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PDFTranMd-macos-arm64
          path: PDFTranMd-macos-arm64.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "PDFTranMd $TAG_NAME" \
              --notes "Apple Silicon arm64 build for M2 and later Macs."
          fi
          gh release upload "$TAG_NAME" PDFTranMd-macos-arm64.zip --clobber
