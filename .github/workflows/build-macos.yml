name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-apple-silicon:
    name: Build macOS Apple Silicon app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show runner architecture
        run: |
          uname -a
          test "$(uname -m)" = "arm64"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "arm64"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate syntax
        run: python -m py_compile app.py

      - name: Build macOS app
        run: pyinstaller --clean --noconfirm PDFTranMd.spec

      - name: Inspect bundle size
        run: du -sh dist/PDFTranMd.app dist/PDFTranMd

      - name: Package artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/PDFTranMd.app PDFTranMd-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PDFTranMd-macos-arm64
          path: PDFTranMd-macos-arm64.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate syntax
        run: python -m py_compile app.py PDFTranMd.windows.spec

      - name: Build Windows app
        run: pyinstaller --clean --noconfirm PDFTranMd.windows.spec

      - name: Inspect bundle size
        run: |
          $size = (Get-ChildItem -Recurse dist\PDFTranMd | Measure-Object Length -Sum).Sum
          "{0:N1} MB" -f ($size / 1MB)

      - name: Package artifact
        run: Compress-Archive -Path dist\PDFTranMd -DestinationPath PDFTranMd-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: PDFTranMd-windows-x64
          path: PDFTranMd-windows-x64.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-apple-silicon
      - build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "PDFTranMd $TAG_NAME" \
              --notes "Desktop builds for macOS Apple Silicon and Windows x64."
          fi
          gh release upload "$TAG_NAME" release-assets/*.zip --clobber
