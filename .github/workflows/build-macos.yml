name: Build macOS App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-apple-silicon:
    name: Build Apple Silicon app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show runner architecture
        run: |
          uname -a
          test "$(uname -m)" = "arm64"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "arm64"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Validate syntax
        run: python -m py_compile app.py

      - name: Build macOS app
        run: pyinstaller --clean --noconfirm PDFTranMd.spec

      - name: Inspect bundle size
        run: du -sh dist/PDFTranMd.app dist/PDFTranMd

      - name: Package artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/PDFTranMd.app PDFTranMd-macos-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFTranMd-macos-arm64
          path: PDFTranMd-macos-arm64.zip
          if-no-files-found: error
